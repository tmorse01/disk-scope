name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Semver version (must match package.json), e.g. 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version is read from the packageManager field in package.json.

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }

          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($version -ne $packageVersion) {
            throw "Release version '$version' does not match package.json version '$packageVersion'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        shell: pwsh
        run: |
          Write-Host "node $(node -v)"
          Write-Host "pnpm $(pnpm -v)"
          pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build native scanner module
        run: pnpm build:native

      - name: Build Windows installers
        run: pnpm make

      - name: Verify out/ build outputs
        shell: pwsh
        run: |
          if (-not (Test-Path "out/DiskScope-win32-x64/DiskScope.exe")) {
            throw "Missing out/DiskScope-win32-x64/DiskScope.exe after pnpm make."
          }
          $setup = Get-ChildItem "out/make/squirrel.windows/x64/*Setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $setup) {
            throw "Missing Squirrel Setup.exe in out/make/squirrel.windows/x64/."
          }
          Write-Host "Squirrel installer: $($setup.Name) ($($setup.Length) bytes)"
          Write-Host "Unpacked app: out/DiskScope-win32-x64/DiskScope.exe"

      - name: Stage release assets
        shell: pwsh
        run: ./scripts/stage-release-assets.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Prepare release notes
        shell: pwsh
        run: ./scripts/build-release-body.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DiskScope ${{ steps.version.outputs.version }}
          body_path: dist/release-body.md
          generate_release_notes: true
          files: |
            dist/release/DiskScope-*-Setup.exe
            dist/release/RELEASES
            dist/release/*.nupkg
            dist/release/DiskScope-*-win32-x64-portable.zip
            dist/release/SHA256SUMS.txt
          fail_on_unmatched_files: true
