name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Semver version (must match package.json), e.g. 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }

          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($version -ne $packageVersion) {
            throw "Release version '$version' does not match package.json version '$packageVersion'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build native scanner module
        run: pnpm build:native

      - name: Build Windows installers
        run: pnpm make

      - name: Stage release assets
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $dist = "dist/release"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          $setup = Get-ChildItem "out/make/squirrel.windows/x64/*Setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "Squirrel Setup.exe not found after pnpm make." }

          $setupName = "DiskScope-$version-Setup.exe"
          Copy-Item $setup.FullName (Join-Path $dist $setupName)

          $portableName = "DiskScope-$version-win32-x64-portable.zip"
          Compress-Archive -Path "out/DiskScope-win32-x64/*" -DestinationPath (Join-Path $dist $portableName) -CompressionLevel Optimal

          $checksumLines = @()
          Get-ChildItem $dist -File | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            $checksumLines += "$hash  $($_.Name)"
          }
          Set-Content -Path (Join-Path $dist "SHA256SUMS.txt") -Value ($checksumLines -join "`n") -NoNewline

          Write-Host "Release assets:"
          Get-ChildItem $dist | Format-Table Name, Length

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DiskScope ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/release/*
          fail_on_unmatched_files: true
